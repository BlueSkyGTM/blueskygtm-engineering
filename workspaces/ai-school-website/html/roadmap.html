<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI School — Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/library.css">
</head>
<body>

  <header class="top">
    <a class="brand" href="index.html"><span class="mark"></span><b>AI School</b></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="course.html">Course</a>
      <a href="roadmap.html" aria-current="page">Roadmap</a>
      <a href="catalog.html">Catalog</a>
      <a href="projects.html">Projects</a>
      <a href="glossary.html">Glossary</a>
    </nav>
  </header>

  <main class="wrap page" data-screen-label="Roadmap">
    <div class="mast">
      <h1 class="mast__t">Roadmap</h1>
      <p class="mast__sub">Click any world to see its prerequisites and everything it unlocks downstream.</p>
    </div>

    <div class="tree-bar">
      <div class="legend">
        <span class="legend__i legend__i--done">Complete</span>
        <span class="legend__i legend__i--active">In Progress</span>
        <span class="legend__i legend__i--locked">Planned</span>
      </div>
      <div class="tree-bar__right">
        <span class="tree-sel" id="selinfo"></span>
        <button class="btn" id="clear" hidden>✕ Clear selection</button>
      </div>
    </div>

    <div class="tree-wrap" id="tree"></div>
    <p class="tree-hint">↔ Scroll to explore the full graph</p>
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/roadmap.js"></script>
</body>
</html>
