<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI School — Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/library.css">
</head>
<body>

  <header class="top">
    <a class="brand" href="index.html"><span class="mark"></span><b>AI School</b></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="course.html">Course</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="catalog.html" aria-current="page">Catalog</a>
      <a href="projects.html">Projects</a>
      <a href="glossary.html">Glossary</a>
    </nav>
  </header>

  <main class="wrap page" data-screen-label="Catalog">

    <!-- search hero: the catalog's whole reason to exist, front and center -->
    <section class="cat-hero">
      <div class="cat-hero__head">
        <h1 class="cat-hero__t">Catalog</h1>
        <span class="cat-hero__sub">Every lesson across all 20 worlds — find anything fast.</span>
      </div>
      <div class="cat-search">
        <span class="cat-search__cue">▸</span>
        <input class="cat-search__in" id="search" type="text" placeholder="Search lessons, languages, topics…" autocomplete="off" autofocus>
      </div>
      <div class="cat-filters">
        <div class="chipset" id="typeChips" role="group" aria-label="Type">
          <button class="chip is-on" data-v="all">All types</button>
          <button class="chip" data-v="Learn">Learn</button>
          <button class="chip" data-v="Build">Build</button>
          <button class="chip" data-v="Capstone">Capstone</button>
        </div>
        <div class="chipset" id="statusChips" role="group" aria-label="Status">
          <button class="chip is-on" data-v="all">Any status</button>
          <button class="chip" data-v="cleared">Cleared</button>
          <button class="chip" data-v="open">Open</button>
          <button class="chip" data-v="planned">Planned</button>
        </div>
        <select class="select" id="fPhase" aria-label="Filter by world"><option value="">All worlds</option></select>
      </div>
    </section>

    <div class="count" id="count"></div>

    <div class="cat-wrap">
      <table class="cat-table">
        <thead>
          <tr>
            <th data-sort="phase">World<span class="arr"> ▲</span></th>
            <th data-sort="name">Lesson<span class="arr"></span></th>
            <th data-sort="type">Type<span class="arr"></span></th>
            <th data-sort="lang">Language<span class="arr"></span></th>
            <th data-sort="status">Status<span class="arr"></span></th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
