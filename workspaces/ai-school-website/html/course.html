<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI School — Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/library.css">
</head>
<body>

  <header class="top">
    <a class="brand" href="index.html"><span class="mark"></span><b>AI School</b></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="course.html" aria-current="page">Course</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="catalog.html">Catalog</a>
      <a href="projects.html">Projects</a>
      <a href="glossary.html">Glossary</a>
    </nav>
  </header>

  <main class="wrap page" data-screen-label="Course">

    <!-- player card: your save file, pinned to the top of the course -->
    <section class="card">
      <div class="card__id" id="id"></div>
      <div class="card__career">
        <div class="eyebrow" style="margin-bottom:var(--s4)">Career stats</div>
        <div id="stats"></div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- curriculum: every world, tick a lesson to bank its XP -->
    <section class="section" style="margin-top:0">
      <div class="section__head">
        <span class="eyebrow">Curriculum · 20 worlds</span>
        <div class="field">
          <select class="select" id="filter" aria-label="Filter by progress">
            <option value="all">All phases</option>
            <option value="progress">In progress</option>
            <option value="cleared">Cleared</option>
            <option value="untouched">Not started</option>
          </select>
        </div>
      </div>
      <div class="count" id="count"></div>
      <div class="toc" id="toc"></div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/course.js"></script>
</body>
</html>
